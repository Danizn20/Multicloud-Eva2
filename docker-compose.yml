version: '3.8'

services:
  database:
    build: ./database
    container_name: cruz_azul_db
    environment:
      - POSTGRES_DB=cruz_azul_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    networks:
      - azul-net
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cruz_azul_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: cruz_azul_app
    ports:
      - "80:3000" # Expone el puerto 80 hacia internet mapeado al 3000 de Node
    environment:
      # En mi PC utilice "database", en AWS se debe cambiar por la IP privada de la EC2
      - DB_HOST=database
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=cruz_azul_db
    networks:
      - azul-net
    depends_on:
      database:
        condition: service_healthy

networks:
  azul-net:
    driver: bridge

volumes:
  pgdata: