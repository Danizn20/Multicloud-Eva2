version: '3.8'

services:
  database:
    build: ./database
    container_name: cruz_azul_db
    restart: always
    environment:
      - POSTGRES_DB=cruz_azul_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=cruzazul
    networks:
      - azul-net
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cruz_azul_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: cruz_azul_app
    restart: always
    ports:
      - "80:3000"
    environment:
      - DB_HOST=database
      - DB_USER=postgres
      - DB_PASSWORD=cruzazul
      - DB_NAME=cruz_azul_db
    networks:
      - azul-net
    depends_on:
      database:
        condition: service_healthy

networks:
  azul-net:
    driver: bridge

volumes:
  pgdata:
